{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 1rem;">Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войти</a></p>
</div>
{% endblock %}
