{% extends 'base.html' %}

{% block title %}Освоено - {{ deck.name }}{% endblock %}

{% block content %}
<style>
    .complete-page { max-width: 460px; margin: 3rem auto; text-align: center; }
    .complete-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; border: 1px solid #f1f5f9; }
    .complete-card h2 { font-size: 1.3rem; font-weight: 700; color: #10b981; margin-bottom: 0.8rem; }
    .complete-card p { color: #64748b; margin-bottom: 1.5rem; }
    .complete-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
</style>

<div class="complete-page">
    <div class="complete-card">
        <h2>Все карточки освоены</h2>
        <p>Вы отлично поработали! Все проблемные слова выучены.</p>
        <div class="complete-actions">
            <a href="{% url 'cards:study_results' deck.pk %}" class="btn btn-primary">Результаты</a>
            <a href="{% url 'cards:deck_detail' deck.pk %}" class="btn btn-outline">К колоде</a>
        </div>
    </div>
</div>
{% endblock %}
