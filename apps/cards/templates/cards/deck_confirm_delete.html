{% extends 'base.html' %}

{% block title %}Удаление колоды{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Удалить колоду "{{ deck.name }}"?</h2>
    <p>Это действие нельзя отменить. Все карточки в этой колоде будут удалены.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'cards:deck_detail' deck.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
